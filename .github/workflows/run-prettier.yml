name: Prettier
on: [push]
jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
      - uses: actions/checkout@v4
      - name: Setup Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: "24.4.1"
      - name: Install dependencies
      - run: npm ci
      - name: Run Prettier check
      - run: npm run prettier:check
